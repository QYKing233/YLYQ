  - {name: 🙉 Microsoft, type: select, proxies: [♻️ 美国自动, ♻️ 日本自动, ♻️ 香港自动, ♻️ 台湾自动, ♻️ 瑞士自动,  🇭🇰 香港节点, 🇯🇵 日本节点, 🇹🇼 台湾节点, 🇺🇸 美国节点, 🇨🇭 瑞士节点]}
  - {name: 🎵 TikTok, type: select, proxies: [♻️ 美国自动, ♻️ 日本自动, ♻️ 香港自动, ♻️ 台湾自动, ♻️ 瑞士自动,  🇭🇰 香港节点, 🇯🇵 日本节点, 🇹🇼 台湾节点, 🇺🇸 美国节点, 🇨🇭 瑞士节点]}
  - {name: 📲 Telegram, type: select, proxies: [♻️ 日本自动, ♻️ 香港自动, ♻️ 台湾自动, ♻️ 美国自动, ♻️ 瑞士自动,  🇭🇰 香港节点, 🇯🇵 日本节点, 🇹🇼 台湾节点, 🇺🇸 美国节点, 🇨🇭 瑞士节点]}
  - {name: 🎥 NETFLIX, type: select, proxies: [♻️ 美国自动, ♻️ 日本自动, ♻️ 香港自动, ♻️ 台湾自动, ♻️ 瑞士自动,  🇭🇰 香港节点, 🇯🇵 日本节点, 🇹🇼 台湾节点, 🇺🇸 美国节点, 🇨🇭 瑞士节点]}
  - {name: 🛰 X, type: select, proxies: [♻️ 美国自动, ♻️ 日本自动, ♻️ 香港自动, ♻️ 台湾自动, ♻️ 瑞士自动,  🇭🇰 香港节点, 🇯🇵 日本节点, 🇹🇼 台湾节点, 🇺🇸 美国节点, 🇨🇭 瑞士节点]}
  - {name: 📱 Instagram, type: select, proxies: [♻️ 日本自动, ♻️ 美国自动, ♻️ 香港自动, ♻️ 台湾自动, ♻️ 瑞士自动,  🇭🇰 香港节点, 🇯🇵 日本节点, 🇹🇼 台湾节点, 🇺🇸 美国节点, 🇨🇭 瑞士节点]}
  - {name: 🐟 漏网之鱼, type: select, proxies: [🚀 默认代理, ♻️ 香港自动, ♻️ 日本自动, ♻️ 台湾自动, ♻️ 美国自动, ♻️ 瑞士自动,  ♻️ 自动选择, 🇭🇰 香港节点, 🇯🇵 日本节点, 🇹🇼 台湾节点, 🇺🇸 美国节点, 🇨🇭 瑞士节点]}
  - {name: 🇭🇰 香港节点, type: select, include-all: true, filter: "(?i)港|HK|hongkong|hong kong"}
  - {name: 🇯🇵 日本节点, type: select, include-all: true, filter: "(?i)日|jp|japan"}
  - {name: 🇹🇼 台湾节点, type: select, include-all: true, filter: "(?i)台|TW|Taiwan"}
  - {name: 🇺🇸 美国节点, type: select, include-all: true, filter: "(?i)美|US|unitedstates|united states"}
  - {name: 🇨🇭 瑞士节点, type: select, include-all: true, filter: "(?i)瑞|CH|switzerland"}
  - {name: ♻️ 香港自动, type: url-test, include-all: true, tolerance: 20, interval: 300, filter: "(?=.*(港|HK|(?i)Hong))^((?!(台|日|韩|新|深|美|瑞)).)*$"}
  - {name: ♻️ 日本自动, type: url-test, include-all: true, tolerance: 20, interval: 300, filter: "(?=.*(日|JP|(?i)Japan))^((?!(港|台|韩|新|美|瑞)).)*$"}
  - {name: ♻️ 台湾自动, type: url-test, include-all: true, tolerance: 20, interval: 300, filter: "(?=.*(台|TW|(?i)Taiwan))^((?!(港|新|韩|日|美|瑞)).)*$"}
  - {name: ♻️ 美国自动, type: url-test, include-all: true, tolerance: 20, interval: 300, filter: "(?=.*(美|US|(?i)States|America))^((?!(港|台|日|韩|新|瑞)).)*$"}
  - {name: ♻️ 瑞士自动, type: url-test, include-all: true, tolerance: 20, interval: 300, filter: "(?=.*(瑞|CH|(?i)Switzerland))^((?!(港|台|日|韩|新|美)).)*$"}
  - {name: ♻️ 自动选择, type: url-test, include-all: true, tolerance: 20, interval: 300, filter: "^((?!(🟢 直连)).)*$"}
  - {name: 🔯 故障转移, type: fallback, include-all: true, tolerance: 20, interval: 300, filter: "(?=.*(美|US|(?i)States|America))^((?!(港|台|韩|新|日|瑞)).)*$"}
  - {name: 🌐 全部节点, type: select, include-all: true, filter: "^((?!(🟢 直连|🔴 拒绝)).)*$"}
  - {name: ⛔ 广告过滤, type: select, proxies: [🔴 拒绝, 🟢 直连]}


