proxy-providers:
  Hneko-V1:
    url: "https://subneko.v1999.sbs/study/xuexi/v999/hneko?token=c83c453dc339ee1f6ba46e42862d116d"
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 5000
    proxy: 🟢 直连
    header:
      User-Agent:
      - "Clash.meta"
    override:
      udp: true
      down: "500 Mbps"
      up: "30 Mbps"
      skip-cert-verify: true


allow-lan: true
bind-address: "*"
ipv6: false
mode: rule


proxies:
  - name: "🟢 直连"
    type: direct
    udp: true
  - name: "🔴 拒绝"
    type: reject
    udp: true
  

profile:
  store-selected: true
  store-fake-ip: true


dns:
  cache-algorithm: arc
  enable: true
  listen: 0.0.0.0:7874
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  respect-rules: true
  proxy-server-nameserver: [223.5.5.5, 119.29.29.29]
  nameserver: [https://doh.pub/dns-query, https://dns.alidns.com/dns-query]
  default-nameserver: [223.5.5.5, 119.29.29.29]
  fallback: [https://dns.google/dns-query, https://dns.cloudflare.com/dns-query]
  fallback-filter: {geoip: true, geoip-code: CN, geosite: [gfw], ipcidr: [240.0.0.0/4], domain: [+.google.com, +.facebook.com, +.youtube.com, msftconnecttest.com, msftncsi.com]}


